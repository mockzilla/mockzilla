# Mockzilla App Configuration
# Override these values by mounting your own app.yml in Docker

title: Mockzilla
port: 2200
serviceURL: /.services
contextAreaPrefix: in-
disableUI: false

editor:
  theme: chrome
  darkTheme: cobalt
  fontSize: 14

history:
  enabled: true
  duration: 1h

# Uncomment to enable a storage driver.
# Built-in drivers: memory (default), redis.
# External drivers (e.g. dynamodb) are available via separate packages.
#
# storage:
#   type: redis
#   redis:
#     address: localhost:6379
#     password: ""
#     db: 0

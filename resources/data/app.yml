# Connexions App Configuration
# Override these values by mounting your own app.yml in Docker

title: Connexions
port: 2200
serviceURL: /.services
contextAreaPrefix: in-
disableUI: false

editor:
  theme: chrome
  darkTheme: cobalt
  fontSize: 14

history:
  enabled: true
  duration: 1h

